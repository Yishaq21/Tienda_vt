spring.application.name=tienda

#Se define el purto por donde escucha el servidor web
server.port=80

#Se define el formato de fecha/hora del log del servidor web
logging.pattern.dateformat=hh:mm



spring.main.banner-mode=off

#se evita el uso de cache en desarrollo en produccion si se debe usar

spring.thymeleaf.cache=false

#Conexión local a la BD Techshop en MySQL
#spring.datasource.url=jdbc:mysql://localhost:3306/techshop
spring.datasource.url=jdbc:mysql://techshop-iguevara30316-isaacgm9921-6a6c.d.aivencloud.com:21299/techshop

#Usuario y clave de creaTablas.sql
spring.datasource.username=usuario_prueba
spring.datasource.password=Usuar1o_Clave.

#Driver y plataforma de comunicación
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

#mostrar información en el log
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.type.descriptor.sql.BasicBinder=TRACE

# Esta informacion se utiliza para obtner acceso a su storage
firebase.bucket.name=tienda-4eac6.firebasestorage.app
firebase.storage.path=techshop
firebase.json.path=firebase
firebase.json.file=tienda-4eac6-firebase-adminsdk-fbsvc-45ac6aae0d.json